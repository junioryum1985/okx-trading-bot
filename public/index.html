<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKX Trading Bot - 3 Estratégias</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>OKX Trading Bot</h1>
      <p>BTC-USDT-SWAP | <span id="status-indicator" class="stopped">PARADO</span></p>
    </div>
    <div class="strat-summary" id="stratSummary"></div>
  </header>

  <div class="grid">
    <div class="card config-card">
      <h2>Configuração</h2>
      <div class="form-group">
        <label>API Key</label>
        <input type="text" id="apiKey" placeholder="OKX API Key">
      </div>
      <div class="form-group">
        <label>Secret Key</label>
        <input type="password" id="secretKey" placeholder="OKX Secret Key">
      </div>
      <div class="form-group">
        <label>Passphrase</label>
        <input type="password" id="passphrase" placeholder="OKX Passphrase">
      </div>
      <div class="form-group">
        <label>Valor Total (USDT) - dividido entre as 3 estratégias</label>
        <input type="number" id="amount" placeholder="Ex: 150" step="0.1" min="30">
        <small id="minSizeInfo">Cada estratégia recebe 1/3 do valor total</small>
      </div>
      <button id="btnStart" class="btn btn-start" onclick="startBot()">INICIAR 3 ESTRATÉGIAS</button>
      <button id="btnStop" class="btn btn-stop" onclick="stopBot()" style="display:none">PARAR TUDO</button>
    </div>

    <div class="card info-card">
      <h2>Estratégias</h2>
      <div id="stratList"></div>
    </div>
  </div>

  <div class="card chart-card">
    <h2>Preço BTC</h2>
    <div class="chart-container"><canvas id="priceChart"></canvas></div>
  </div>

  <div class="card chart-card">
    <h2>Trades Realizados</h2>
    <div class="chart-container"><canvas id="tradeChart"></canvas></div>
    <div id="tradeTableContainer"></div>
  </div>

  <div class="card log-card">
    <h2>Logs</h2>
    <div id="logContainer"></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
