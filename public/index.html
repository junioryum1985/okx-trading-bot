<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKX Trading Bot</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>OKX Trading Bot</h1>
    <p>BTC-USDT-SWAP | <span id="status-indicator" class="stopped">PARADO</span></p>
  </header>

  <div class="grid">
    <div class="card config-card">
      <h2>Configuração</h2>
      <div class="form-group">
        <label>API Key</label>
        <input type="text" id="apiKey" placeholder="OKX API Key">
      </div>
      <div class="form-group">
        <label>Secret Key</label>
        <input type="password" id="secretKey" placeholder="OKX Secret Key">
      </div>
      <div class="form-group">
        <label>Passphrase</label>
        <input type="password" id="passphrase" placeholder="OKX Passphrase">
      </div>
      <div class="form-group">
        <label>Estratégia</label>
        <select id="strategy"></select>
      </div>
      <div class="form-group">
        <label>Valor de Entrada (USDT)</label>
        <input type="number" id="amount" placeholder="Ex: 50" step="0.1" min="10">
        <small id="minSizeInfo">Mínimo: consultando...</small>
      </div>
      <div class="form-group">
        <label>Alavancagem</label>
        <input type="text" id="leverageDisplay" disabled>
      </div>
      <div class="form-group">
        <label>TP / SL</label>
        <input type="text" id="tpslDisplay" disabled>
      </div>
      <button id="btnStart" class="btn btn-start" onclick="startBot()">INICIAR</button>
      <button id="btnStop" class="btn btn-stop" onclick="stopBot()" style="display:none">PARAR</button>
    </div>

    <div class="card info-card">
      <h2>Posição Atual</h2>
      <div class="info-grid">
        <div><span class="label">Side</span><span id="posSide" class="value">-</span></div>
        <div><span class="label">Entry</span><span id="posEntry" class="value">-</span></div>
        <div><span class="label">Preço Atual</span><span id="posPrice" class="value">-</span></div>
        <div><span class="label">PNL</span><span id="posPnl" class="value">-</span></div>
        <div><span class="label">PNL %</span><span id="posPnlPct" class="value">-</span></div>
        <div><span class="label">Último Sinal</span><span id="lastSignal" class="value">-</span></div>
      </div>
    </div>
  </div>

  <div class="card chart-card">
    <h2>Gráfico de Preço & Trades</h2>
    <div class="chart-container">
      <canvas id="priceChart"></canvas>
    </div>
  </div>

  <div class="card chart-card">
    <h2>Equity Curve (PNL Acumulado)</h2>
    <div class="chart-container">
      <canvas id="equityChart"></canvas>
    </div>
  </div>

  <div class="card log-card">
    <h2>Logs</h2>
    <div id="logContainer"></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
